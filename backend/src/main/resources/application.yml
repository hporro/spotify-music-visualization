server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:spotifydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

spotify:
  client-id: ${SPOTIFY_CLIENT_ID:placeholder-id}
  client-secret: ${SPOTIFY_CLIENT_SECRET:placeholder-secret}
  redirect-uri: ${SPOTIFY_REDIRECT_URI:http://localhost:8080/api/auth/callback}
